version: "3.8"
services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft_server
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      MEMORY: "4G"
      TYPE: "FORGE"
    volumes:
      - ./:/data
    stdin_open: true
    tty: true